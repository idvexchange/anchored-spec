<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Anchored Spec">
  <title>Anchored Spec</title>
  <desc>Anchored Spec logo: a graph-node anchor mark with the project wordmark.</desc>
  <style>
    .stroke   { stroke: #0B2545; }
    .node     { fill: #13A89E; }
    .word     { fill: #0B2545; font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif; font-weight: 700; letter-spacing: -0.5px; }
    .tag      { fill: #5B7290; font-family: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace; font-weight: 500; letter-spacing: 1.5px; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #E6F1FF; }
      .node   { fill: #2DD4BF; }
      .word   { fill: #E6F1FF; }
      .tag    { fill: #94A8C2; }
    }
  </style>

  <g transform="translate(8 8)">
    <g class="stroke" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="32" cy="12" r="5"/>
      <line x1="32" y1="17" x2="32" y2="48"/>
      <line x1="20" y1="22" x2="44" y2="22"/>
      <path d="M 18 40 Q 18 52 32 52 Q 46 52 46 40"/>
      <line x1="18" y1="40" x2="14" y2="44"/>
      <line x1="46" y1="40" x2="50" y2="44"/>
    </g>
    <g class="node">
      <circle cx="32" cy="12" r="1.8"/>
      <circle cx="20" cy="22" r="2.6"/>
      <circle cx="44" cy="22" r="2.6"/>
      <circle cx="14" cy="44" r="2.6"/>
      <circle cx="50" cy="44" r="2.6"/>
    </g>
  </g>

  <text x="88" y="44" class="word" font-size="26">anchored<tspan dx="2" fill="#13A89E">·</tspan>spec</text>
  <text x="89" y="62" class="tag" font-size="9">SPEC · AS · SOURCE  ARCHITECTURE</text>
</svg>
