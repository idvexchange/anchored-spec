apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: production
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: kube-system
spec:
  template:
    spec:
      containers:
        - name: fluentd
          image: fluent/fluentd:v1.16
