apiVersion: anchored-spec/ea/v1
kind: exception
id: EXC-no-auth-dev

metadata:
  name: No Authentication in v0.1 Development
  summary: >
    Approved exception allowing the v0.1 development build to
    operate without authentication. All API endpoints are open
    and accessible without credentials in the local development
    environment.
  owners:
    - team-frontend
  tags:
    - exception
    - security
    - auth
    - approved
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  reason: >
    Authentication is deferred to wave-2 of the persistence migration plan.
    The v0.1 development build runs locally without auth. All API endpoints
    are open. Acceptable for local-only development tier.
  scope:
    rules:
      - ea:systems/missing-auth
    artifactIds:
      - APP-todo-web
      - API-todo-v1
  approvedBy: "@lead-architect"
  approvedAt: "2026-03-29T00:00:00Z"
  expiresAt: "2026-07-31T00:00:00Z"
  reviewSchedule: monthly

relations:
  - type: suppresses
    target: APP-todo-web
  - type: suppresses
    target: API-todo-v1
  - type: mitigates
    target: TPLAN-persistence-migration
