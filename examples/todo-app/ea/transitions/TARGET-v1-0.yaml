apiVersion: anchored-spec/ea/v1
kind: target
id: TARGET-v1-0

metadata:
  name: Target v1.0 — Persistent & Production-Ready
  summary: >
    Target architecture state for v1.0 introducing persistent
    SQLite storage, user authentication, notification service,
    and Vercel production deployment.
  owners:
    - team-frontend
  tags:
    - target
    - v1.0
    - future-state
  confidence: declared
  status: planned
  schemaVersion: "1.0.0"

spec:
  scope:
    description: >
      Target architecture for Todo app v1.0 — persistent storage with SQLite,
      user authentication, notification service, and Vercel production deployment.
    domains:
      - systems
      - data
      - delivery
  effectiveBy: "2026-09-30T00:00:00Z"
  successMetrics:
    - id: data-persistence
      metric: Data persistence across sessions
      target: 100% of todos persisted in SQLite
    - id: api-latency
      metric: API response time at p95
      target: Under 200ms
    - id: auth-coverage
      metric: Endpoints with authentication enforced
      target: 100% of API routes
    - id: uptime
      metric: Production availability
      target: 99.9% uptime on Vercel
  artifactRefs:
    - APP-todo-web
    - API-todo-v1
    - SVC-todo-notifications
    - STORE-todo-memory
    - DEPLOY-todo-vercel
    - ENV-production
    - PIPE-todo-ci
  targetDate: "2026-09-30T00:00:00Z"
  baseline: BASELINE-v0-1
  changes:
    added:
      - id: SVC-todo-auth
        kind: service
        description: "Authentication service with session management"
      - id: SVC-todo-notifications
        kind: service
        description: "Due date reminder notifications"
      - id: STORE-todo-sqlite
        kind: data-store
        description: "SQLite persistent storage replacing in-memory"
    modified:
      - id: STORE-todo-memory
        changes:
          - field: status
            from: active
            to: deprecated
          - field: metadata.summary
            description: "Replaced by STORE-todo-sqlite"
      - id: APP-todo-web
        changes:
          - field: metadata.tags
            description: "Add auth, sqlite, notifications tags"
    removed: []
  constraints:
    - "Zero data loss during storage migration"
    - "API contract backward-compatible"
    - "Sub-200ms response time maintained"

relations:
  - type: dependsOn
    target: BASELINE-v0-1
  - type: dependsOn
    target: PLAN-persistence-migration
