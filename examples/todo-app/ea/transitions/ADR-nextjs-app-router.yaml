apiVersion: anchored-spec/ea/v1
kind: decision
id: ADR-nextjs-app-router

metadata:
  name: Use Next.js App Router
  summary: >
    Use Next.js App Router with server components for the todo application
    to leverage built-in SSR, API routes, and React Server Components.
  owners:
    - engineering-team
  tags:
    - architecture
    - frontend
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  context: >
    The todo app needs a modern React framework that supports server-side
    rendering, API routes, and efficient client/server code splitting.
  decision: >
    Use Next.js 16 with the App Router pattern for routing, API endpoints,
    and React Server Components.
  rationale: >
    Next.js App Router provides built-in API routes (eliminating the need
    for a separate backend), React Server Components for performance, and
    a mature deployment story via Vercel.
  alternatives:
    - name: Vite + Express
      verdict: rejected
      reason: Requires maintaining separate frontend and backend codebases
    - name: Remix
      verdict: rejected
      reason: Smaller ecosystem and less mature deployment options
    - name: Next.js Pages Router
      verdict: rejected
      reason: Legacy pattern without React Server Components support
  adDomain: systems
  nistFunction: protect
  riskFrameworkStep: select
  riskLevel: moderate
  complianceFrameworks:
    - NIST CSF
    - OWASP ASVS
  governanceImpact: >
    Framework choice determines attack surface, CSP headers, and
    server-side rendering security model. Next.js server components
    reduce client-side exposure of sensitive logic.
  implications: >
    All API endpoints live under app/api/. Server components are the default.
    Client components must be explicitly marked with "use client".

relations:
  - type: dependsOn
    target: APP-todo-web
