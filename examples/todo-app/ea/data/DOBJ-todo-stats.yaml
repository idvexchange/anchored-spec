apiVersion: anchored-spec/ea/v1
kind: data-object
id: DOBJ-todo-stats

metadata:
  name: Todo Statistics Data Object
  summary: >
    Computed statistics derived from task data including totals,
    status breakdowns, overdue counts, and aggregations by
    priority and category.
  owners:
    - team-frontend
  tags:
    - data-object
    - computed
    - statistics
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  type: computed
  derivedFrom: DOBJ-task
  columns:
    - name: total
      type: number
    - name: pending
      type: number
    - name: inProgress
      type: number
    - name: completed
      type: number
    - name: overdue
      type: number
    - name: byPriority
      type: object
    - name: byCategory
      type: object

anchors:
  interfaces:
    - symbol: TodoStats
      file: lib/types.ts

relations:
  - type: containedIn
    target: STORE-todo-memory
  - type: receivesFrom
    target: DOBJ-task
