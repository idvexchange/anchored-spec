apiVersion: anchored-spec/ea/v1
kind: data-object
id: DOBJ-task

metadata:
  name: Task Data Object
  summary: >
    Primary data object representing a todo task with full column
    specification including identity, content, status, priority,
    categorization, scheduling, and audit timestamps.
  owners:
    - team-frontend
  tags:
    - data-object
    - core
    - task
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  type: object
  store: STORE-todo-memory
  columns:
    - name: id
      type: string
      primaryKey: true
    - name: title
      type: string
      nullable: false
    - name: description
      type: string
      nullable: true
    - name: status
      type: string
      nullable: false
      enum:
        - pending
        - in-progress
        - completed
        - archived
    - name: priority
      type: string
      nullable: false
      enum:
        - low
        - medium
        - high
        - urgent
    - name: category
      type: string
      nullable: true
    - name: dueDate
      type: string
      nullable: true
    - name: tags
      type: "string[]"
    - name: createdAt
      type: string
      nullable: false
    - name: updatedAt
      type: string
      nullable: false
    - name: completedAt
      type: string
      nullable: true

anchors:
  interfaces:
    - symbol: Todo
      file: lib/types.ts

relations:
  - type: containedIn
    target: STORE-todo-memory
  - type: flowsTo
    target: DOBJ-todo-stats
