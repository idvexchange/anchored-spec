apiVersion: anchored-spec/ea/v1
kind: canonical-entity
id: CE-task-entity

metadata:
  name: Task Canonical Entity
  summary: >
    The canonical definition of the Task entity across the system.
    Establishes the authoritative attribute set and constraints that
    all implementations must conform to.
  owners:
    - team-product
  tags:
    - canonical
    - entity
    - task
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  attributes:
    - name: id
      type: uuid
      description: Unique task identifier
    - name: title
      type: string
      description: Short task description (required)
    - name: status
      type: enum
      description: Current lifecycle state
    - name: priority
      type: enum
      description: Urgency level
  uniqueConstraints:
    - - id

relations:
  - type: implementedBy
    target: DOBJ-task
