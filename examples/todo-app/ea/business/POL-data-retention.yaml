apiVersion: anchored-spec/ea/v1
kind: policy-objective
id: POL-data-retention

metadata:
  name: Data Retention Policy
  summary: >
    Data retention policy governing the lifecycle of archived todos.
    Archived tasks are retained for 90 days after archival, then
    permanently purged from the data store.
  owners:
    - team-product
  tags:
    - policy
    - data-governance
    - retention
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  category: data-governance
  objective: >
    Ensure archived todos are retained for exactly 90 days before permanent
    deletion. Prevent unbounded data growth in the task store.
  reviewCadence: quarterly
  policy: data-retention
  retentionPeriod: "90 days"
  scope: archived-todos
  description: >
    All todos in "archived" status are retained for a maximum of 90
    calendar days from the date of archival. After this period, the
    system permanently purges the data. This policy applies to all
    data stores (current in-memory and future persistent storage).
  enforcement: automated
  exceptions: >
    Todos flagged with a legal-hold tag are exempt from automatic
    purge and must be manually reviewed before deletion.

relations:
  - type: dependsOn
    target: STORE-todo-memory
