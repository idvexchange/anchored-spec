apiVersion: anchored-spec/ea/v1
kind: process
id: PROC-task-lifecycle

metadata:
  name: Task Lifecycle Process
  summary: >
    The full lifecycle of a task from initial creation through
    prioritization, active work, completion, and eventual archival.
    Defines actors, inputs, and outputs for each stage.
  owners:
    - team-product
  tags:
    - core
    - lifecycle
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  trigger: User identifies a new task to track
  outcome: Task completed or archived with full audit trail
  processOwner: team-product
  steps:
    - id: creation
      name: Task Creation
      description: User captures a new task with title and metadata
      actor: end-user
      systemRef: APP-todo-web
    - id: prioritization
      name: Task Prioritization
      description: User assigns priority level and due date
      actor: end-user
      systemRef: APP-todo-web
    - id: execution
      name: Task Execution
      description: User works on task and updates status to in-progress
      actor: end-user
      systemRef: APP-todo-web
    - id: completion
      name: Task Completion
      description: User marks task as completed with timestamp
      actor: end-user
      systemRef: APP-todo-web
    - id: archival
      name: Task Archival
      description: Completed tasks archived after review period
      actor: end-user
      systemRef: APP-todo-web

relations:
  - type: supports
    target: CAP-task-management
  - type: governedBy
    target: POL-data-retention
