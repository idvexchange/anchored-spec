apiVersion: anchored-spec/ea/v1
kind: capability
id: CAP-task-management

metadata:
  name: Task Management
  summary: >
    Core business capability for managing personal and team tasks
    through their full lifecycle including creation, prioritization,
    execution, completion, and archival.
  owners:
    - team-product
  tags:
    - core
    - productivity
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  level: 1
  maturity: defined
  strategicImportance: core
  domain: task-management
  description: >
    Provides the foundational ability to create, organize, track, and
    complete tasks. Supports priority levels, categorization, status
    tracking, due dates, and tagging. This capability is the primary
    value driver of the todo application.

relations:
  - type: realizedBy
    target: APP-todo-web
  - type: supports
    target: VS-task-delivery
