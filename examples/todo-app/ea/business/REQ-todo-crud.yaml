apiVersion: anchored-spec/ea/v1
kind: requirement
id: REQ-todo-crud

metadata:
  name: Todo CRUD Operations
  summary: >
    Users must be able to create, read, update, and delete todo items
    with support for priorities, categories, and due dates.
  owners:
    - product-team
  tags:
    - core
    - mvp
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  category: functional
  priority: must
  behaviorStatements:
    - id: bs-create
      text: "When a user submits a new todo, the system shall create a todo item with the provided title, priority, and optional category."
      format: EARS
      trigger: "user submits a new todo"
      response: "system creates a todo item"
    - id: bs-complete
      text: "When a user marks a todo as complete, the system shall update the todo status to done and record the completion timestamp."
      format: EARS
      trigger: "user marks a todo as complete"
      response: "system updates status and records timestamp"
    - id: bs-delete
      text: "When a user deletes a todo, the system shall remove the todo item and return a confirmation."
      format: EARS
      trigger: "user deletes a todo"
      response: "system removes the item"
  verification:
    coverageStatus: partial
    testRefs: []

relations:
  - type: supports
    target: CAP-task-management
  - type: governedBy
    target: POL-data-retention
