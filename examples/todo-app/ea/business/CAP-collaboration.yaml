apiVersion: anchored-spec/ea/v1
kind: capability
id: CAP-collaboration

metadata:
  name: Collaboration
  summary: >
    Planned business capability for collaborative task management
    including sharing tasks between users, assigning ownership, and
    team-based workflow coordination.
  owners:
    - team-product
  tags:
    - planned
    - collaboration
  confidence: declared
  status: planned
  schemaVersion: "1.0.0"

spec:
  level: 2
  parentCapability: CAP-task-management
  maturity: initial
  strategicImportance: differentiating
  domain: collaboration
  description: >
    Future capability enabling multiple users to share, assign, and
    collaborate on tasks. Will support task delegation, shared views,
    and activity feeds. Depends on authentication infrastructure
    being in place (wave-2 of migration plan).

relations:
  - type: supportedBy
    target: CAP-task-management
