apiVersion: anchored-spec/ea/v1
kind: consumer
id: CON-browser-client

metadata:
  name: Browser Client
  summary: >
    The browser-based React single-page application that consumes
    the Todo REST API. Renders the UI components for task management
    and communicates with the server via fetch requests.
  owners:
    - team-frontend
  tags:
    - react
    - spa
    - browser
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  consumerType: internal
  consumesContracts:
    - API-todo-v1
  type: browser-spa
  technology: React
  description: >
    Client-side React application rendered in the browser. Composed
    of TodoApp (orchestrator), TodoInput, TodoItem, TodoList,
    TodoFilter, and TodoStats components. Consumes the REST API
    for all data operations.

anchors:
  interfaces:
    - symbol: TodoApp
      file: components/TodoApp.tsx

relations:
  - type: consumes
    target: API-todo-v1
