apiVersion: anchored-spec/ea/v1
kind: security-requirement
id: SREQ-access-control

metadata:
  name: Access Control for Todo API
  summary: >
    API endpoints must enforce authentication and authorization
    controls aligned to NIST AC-2 (Account Management) and
    AC-3 (Access Enforcement).
  owners:
    - security-team
  tags:
    - nist-800-53
    - access-control
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  controlFamily: AC
  nistControl: AC-3
  securityBaseline: moderate
  implementationStatus: planned
  assessmentMethod: test
  complianceFrameworks:
    - NIST 800-53
    - OWASP Top 10
  priority: must

relations:
  - type: governedBy
    target: POL-data-retention
  - type: dependsOn
    target: REQ-todo-crud
