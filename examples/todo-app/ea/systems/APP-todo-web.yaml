apiVersion: anchored-spec/ea/v1
kind: application
id: APP-todo-web

metadata:
  name: Todo Web Application
  summary: >
    The Next.js 16.2.1 full-stack todo application providing a
    React-based single-page interface with server-side REST API
    routes for task management CRUD operations.
  owners:
    - team-frontend
  tags:
    - nextjs
    - react
    - typescript
    - full-stack
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  framework: "Next.js 16.2.1"
  language: TypeScript
  runtime: "Node.js"
  description: >
    Full-stack todo application built with Next.js App Router.
    Client-side React components handle the UI while server-side
    route handlers provide a REST API backed by an in-memory store.

anchors:
  interfaces:
    - symbol: TodoApp
      file: components/TodoApp.tsx
    - symbol: TodoStore
      file: lib/store.ts
  apis:
    - route: "GET /api/todos"
      file: app/api/todos/route.ts
    - route: "POST /api/todos"
      file: app/api/todos/route.ts
    - route: "GET /api/todos/:id"
      file: "app/api/todos/[id]/route.ts"
    - route: "PATCH /api/todos/:id"
      file: "app/api/todos/[id]/route.ts"
    - route: "DELETE /api/todos/:id"
      file: "app/api/todos/[id]/route.ts"
  configs:
    - path: next.config.ts
    - path: tsconfig.json

relations:
  - type: implements
    target: API-todo-v1
  - type: realizes
    target: CAP-task-management
  - type: storesIn
    target: STORE-todo-memory
  - type: deployedAs
    target: DEP-todo-vercel
  - type: publishes
    target: SVC-todo-notifications
