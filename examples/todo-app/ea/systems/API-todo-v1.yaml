apiVersion: anchored-spec/ea/v1
kind: api-contract
id: API-todo-v1

metadata:
  name: Todo REST API v1
  summary: >
    REST API contract defining the CRUD operations for todo
    management. Provides endpoints for listing, creating, reading,
    updating, and deleting todos via JSON over HTTP.
  owners:
    - team-frontend
  tags:
    - rest
    - api
    - json
    - crud
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  protocol: rest
  version: "1.0.0"
  basePath: "/api"
  format: json
  endpoints:
    - method: GET
      path: /todos
      description: List all todos with optional filtering by status, priority, and category.
    - method: POST
      path: /todos
      description: Create a new todo with title, description, priority, category, due date, and tags.
    - method: GET
      path: "/todos/{id}"
      description: Get a single todo by its unique identifier.
    - method: PATCH
      path: "/todos/{id}"
      description: Update one or more fields of an existing todo.
    - method: DELETE
      path: "/todos/{id}"
      description: Permanently delete a todo by its unique identifier.

anchors:
  apis:
    - route: "GET /api/todos"
      file: app/api/todos/route.ts
    - route: "POST /api/todos"
      file: app/api/todos/route.ts
    - route: "GET /api/todos/:id"
      file: "app/api/todos/[id]/route.ts"
    - route: "PATCH /api/todos/:id"
      file: "app/api/todos/[id]/route.ts"
    - route: "DELETE /api/todos/:id"
      file: "app/api/todos/[id]/route.ts"

relations:
  - type: implementedBy
    target: APP-todo-web
  - type: consumedBy
    target: CON-browser-client
