apiVersion: anchored-spec/ea/v1
kind: service
id: SVC-todo-notifications

metadata:
  name: Todo Notification Service
  summary: >
    Planned notification service for sending due date reminders
    and overdue alerts to users. Will integrate with the todo
    application to monitor task deadlines.
  owners:
    - team-frontend
  tags:
    - planned
    - notifications
    - reminders
  confidence: declared
  status: planned
  schemaVersion: "1.0.0"

spec:
  type: background-service
  description: >
    Future service responsible for monitoring todo due dates and
    sending timely reminders before deadlines. Will also detect
    overdue tasks and escalate alerts. Planned for wave-3 of the
    persistence migration.
  triggers:
    - due-date-approaching
    - task-overdue
  channels:
    - in-app
    - email (planned)

relations:
  - type: dependsOn
    target: APP-todo-web
  - type: uses
    target: STORE-todo-memory
