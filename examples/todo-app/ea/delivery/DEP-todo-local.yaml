apiVersion: anchored-spec/ea/v1
kind: deployment
id: DEP-todo-local

metadata:
  name: Local Development Deployment
  summary: >
    Next.js development server deployment running on localhost
    port 3000 with hot module reload for rapid local development
    and testing.
  owners:
    - team-frontend
  tags:
    - deployment
    - local
    - dev-server
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  platform: "next-dev"
  command: "npm run dev"
  port: 3000
  hotReload: true
  description: >
    Local Next.js dev server started via npm run dev. Provides
    hot reload, error overlay, and development-mode optimizations.

anchors:
  configs:
    - path: next.config.ts

relations:
  - type: deploys
    target: APP-todo-web
  - type: deployedTo
    target: ENV-development
