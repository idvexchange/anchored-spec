apiVersion: anchored-spec/ea/v1
kind: environment
id: ENV-development

metadata:
  name: Development Environment
  summary: >
    Local development environment running the Next.js dev server
    on localhost. Provides hot module reload and development
    tooling for rapid iteration.
  owners:
    - team-frontend
  tags:
    - environment
    - development
    - local
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  provider: local
  isProduction: false
  tier: development
  url: "http://localhost:3000"
  description: >
    Local developer workstation running next dev with hot reload
    enabled. No authentication required. In-memory store resets
    on each server restart.

relations:
  - type: hosts
    target: DEP-todo-local
