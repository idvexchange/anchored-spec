apiVersion: anchored-spec/ea/v1
kind: application
id: APP-order-service

metadata:
  name: Order Service
  summary: >
    Core order processing application handling order creation,
    fulfillment, and lifecycle management for the e-commerce platform.
  owners:
    - team-commerce
    - "@jsmith"
  tags:
    - core
    - revenue-critical
    - domain-orders
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

anchors:
  interfaces:
    - symbol: OrderController
      file: src/controllers/order.controller.ts
    - symbol: OrderService
      file: src/services/order.service.ts
  apis:
    - route: "POST /api/v2/orders"
      file: src/routes/orders.ts
    - route: "GET /api/v2/orders/:id"
      file: src/routes/orders.ts
    - route: "PUT /api/v2/orders/:id/status"
      file: src/routes/orders.ts
  configs:
    - path: k8s/order-service/deployment.yaml
    - path: .env.example

relations:
  - type: dependsOn
    target: SVC-payment-api
    metadata:
      criticality: high
      description: Calls payment API for order checkout
  - type: implements
    target: API-orders-v2
  - type: deployedAs
    target: DEP-order-service-k8s
  - type: storesIn
    target: STORE-orders-postgres
  - type: publishes
    target: IFACE-order-events
    metadata:
      events:
        - order.created
        - order.updated
        - order.fulfilled
