apiVersion: anchored-spec/ea/v1
kind: service
id: SVC-payment-api

metadata:
  name: Payment API
  summary: >
    Payment processing service handling credit card charges,
    refunds, and payment method management. Wraps Stripe SDK.
  owners:
    - team-payments
  tags:
    - core
    - pci-scope
    - domain-payments
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

anchors:
  interfaces:
    - symbol: PaymentController
      file: src/controllers/payment.controller.ts
  apis:
    - route: "POST /api/v1/payments/charge"
      file: src/routes/payments.ts
    - route: "POST /api/v1/payments/refund"
      file: src/routes/payments.ts
    - route: "GET /api/v1/payments/:id"
      file: src/routes/payments.ts

relations:
  - type: deployedAs
    target: DEP-payment-api-k8s
  - type: storesIn
    target: STORE-payments-postgres
