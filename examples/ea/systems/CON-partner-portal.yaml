apiVersion: anchored-spec/ea/v1
kind: consumer
id: CON-partner-portal

metadata:
  name: Partner Portal
  summary: >
    External partner-facing web application that consumes the
    Orders API v2 to allow partners to submit and track bulk orders.
  owners:
    - team-partnerships
  tags:
    - external
    - partner
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  consumerType: partner
  consumesContracts:
    - API-orders-v2
  contact:
    email: partners@example.com
  contractVersion: ">=2.0.0"

relations:
  - type: consumes
    target: API-orders-v2
