apiVersion: anchored-spec/ea/v1
kind: target
id: TARGET-q3-2026

metadata:
  name: Q3 2026 Target Architecture
  summary: >
    Target architecture for Q3 2026. Key change: migrate from
    monolithic payment service to event-driven payment microservices
    with Stripe Connect integration.
  owners:
    - team-architecture
    - team-payments
  tags:
    - quarterly
    - payment-migration
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  targetDate: "2026-09-30T00:00:00Z"
  baseline: BASELINE-q1-2026
  changes:
    added:
      - id: SVC-payment-events
        kind: service
        description: New event-driven payment processing service
      - id: IFACE-payment-events
        kind: system-interface
        description: Kafka topic for payment lifecycle events
    modified:
      - id: SVC-payment-api
        changes:
          - field: status
            from: active
            to: deprecated
          - field: metadata.summary
            description: Mark as deprecated, redirect to new payment events service
    removed: []
  constraints:
    - Zero downtime during migration
    - PCI compliance maintained throughout
    - Partner portal must continue working with existing API

relations:
  - type: compares
    target: BASELINE-q1-2026
  - type: implementedBy
    target: TPLAN-payment-migration
