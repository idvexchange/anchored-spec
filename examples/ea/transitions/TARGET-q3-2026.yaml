apiVersion: anchored-spec/ea/v1
kind: target
id: TARGET-q3-2026

metadata:
  name: Q3 2026 Target Architecture
  summary: >
    Target architecture for Q3 2026. Key change: migrate from
    monolithic payment service to event-driven payment microservices
    with Stripe Connect integration.
  owners:
    - team-architecture
    - team-payments
  tags:
    - quarterly
    - payment-migration
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  scope:
    description: >
      Target architecture for Q3 2026: migrate from monolithic payment
      service to event-driven payment microservices with Stripe Connect.
    domains:
      - systems
      - delivery
      - data
  effectiveBy: "2026-09-30T00:00:00Z"
  artifactRefs:
    - APP-order-service
    - SVC-payment-api
    - SVC-payment-events
    - API-orders-v2
    - IFACE-order-events
    - IFACE-payment-events
    - DEP-order-service-k8s
    - STORE-orders-postgres
    - ENV-production
  baseline: BASELINE-q1-2026
  changes:
    added:
      - id: SVC-payment-events
        kind: service
        description: New event-driven payment processing service
      - id: IFACE-payment-events
        kind: system-interface
        description: Kafka topic for payment lifecycle events
    modified:
      - id: SVC-payment-api
        changes:
          - field: status
            from: active
            to: deprecated
          - field: metadata.summary
            description: Mark as deprecated, redirect to new payment events service
    removed: []
  constraints:
    - Zero downtime during migration
    - PCI compliance maintained throughout
    - Partner portal must continue working with existing API

relations:
  - type: compares
    target: BASELINE-q1-2026
  - type: implementedBy
    target: TPLAN-payment-migration
