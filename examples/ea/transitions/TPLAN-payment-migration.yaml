apiVersion: anchored-spec/ea/v1
kind: transition-plan
id: TPLAN-payment-migration

metadata:
  name: Payment Service Migration Plan
  summary: >
    Phased migration plan to replace the monolithic payment API
    with event-driven payment microservices. Three waves over Q2-Q3 2026.
  owners:
    - team-payments
    - team-architecture
  tags:
    - migration
    - multi-wave
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  baseline: BASELINE-q1-2026
  target: TARGET-q3-2026
  milestones:
    - id: wave-1-foundation
      title: "Wave 1: Foundation — Shadow Mode"
      deliverables:
        - SVC-payment-events
        - IFACE-payment-events
      status: pending
      criteria:
        - Payment events service deployed in shadow mode
        - Kafka topics provisioned and producing events
        - Existing payment API unaffected
    - id: wave-2-migration
      title: "Wave 2: Migration — Dual-Write"
      deliverables:
        - APP-order-service
      status: pending
      criteria:
        - Order service uses event publishing instead of REST
        - Dual-write consistency verified via saga pattern
        - All integration tests passing
    - id: wave-3-deprecation
      title: "Wave 3: Deprecation — Cleanup"
      deliverables:
        - SVC-payment-api
        - CON-partner-portal
      status: pending
      criteria:
        - Old payment API deprecated and consumers migrated
        - Partner portal using new payment events interface
        - Legacy endpoint decommissioned after verification
  milestoneDependencies:
    - milestone: wave-2-migration
      dependsOn: wave-1-foundation
    - milestone: wave-3-deprecation
      dependsOn: wave-2-migration
  riskRegister:
    - id: risk-kafka-permissions
      description: Kafka topic permissions may delay wave-1 setup
      likelihood: medium
      impact: medium
      mitigation: Pre-provision topics in staging environment now
    - id: risk-dual-write
      description: Dual-write consistency issues during wave-2
      likelihood: medium
      impact: high
      mitigation: Implement saga pattern with compensation events
    - id: risk-partner-integration
      description: Partner portal migration may take longer than planned
      likelihood: medium
      impact: medium
      mitigation: Provide adapter layer for backwards compatibility
  approvalPolicy:
    requiredApprovers:
      - team-architecture
      - team-payments
      - vp-engineering

relations:
  - type: transitions
    target: BASELINE-q1-2026
  - type: achieves
    target: TARGET-q3-2026
