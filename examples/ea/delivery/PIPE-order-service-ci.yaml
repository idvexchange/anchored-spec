apiVersion: anchored-spec/ea/v1
kind: pipeline
id: PIPE-order-service-ci

metadata:
  name: Order Service CI/CD Pipeline
  summary: >
    GitHub Actions pipeline for the order service. Runs tests,
    builds Docker image, and deploys to staging/production.
  owners:
    - team-platform
  tags:
    - github-actions
    - ci-cd
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  platform: github-actions
  trigger:
    branches: ["main", "release/*"]
    events: ["push", "pull_request"]
  stages:
    - name: test
      description: Run unit and integration tests
    - name: build
      description: Build Docker image
    - name: deploy-staging
      description: Deploy to staging environment
      requiresApproval: false
    - name: deploy-production
      description: Deploy to production environment
      requiresApproval: true

anchors:
  configs:
    - path: .github/workflows/order-service.yml

relations:
  - type: builds
    target: APP-order-service
  - type: deploysTo
    target: DEP-order-service-k8s
