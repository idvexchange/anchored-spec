apiVersion: anchored-spec/ea/v1
kind: deployment
id: DEP-order-service-k8s

metadata:
  name: Order Service K8s Deployment
  summary: >
    Kubernetes deployment for the order service. Runs in the
    commerce namespace with HPA scaling between 3-10 replicas.
  owners:
    - team-platform
    - team-commerce
  tags:
    - kubernetes
    - production
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  platform: kubernetes
  namespace: commerce
  replicas:
    min: 3
    max: 10
    desired: 3
  resources:
    cpu: "500m"
    memory: "512Mi"
  healthCheck:
    path: /healthz
    port: 8080
  image: registry.example.com/order-service

anchors:
  configs:
    - path: k8s/order-service/deployment.yaml
    - path: k8s/order-service/service.yaml
    - path: k8s/order-service/hpa.yaml

relations:
  - type: deploys
    target: APP-order-service
  - type: deployedTo
    target: ENV-production
  - type: dependsOn
    target: STORE-orders-postgres
    metadata:
      description: Needs DB connectivity at startup
