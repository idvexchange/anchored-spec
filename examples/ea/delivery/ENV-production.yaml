apiVersion: anchored-spec/ea/v1
kind: environment
id: ENV-production

metadata:
  name: Production Environment
  summary: >
    Production environment running on AWS EKS in us-east-1.
    All customer-facing workloads deploy here.
  owners:
    - team-platform
    - team-sre
  tags:
    - aws
    - eks
    - production
  confidence: declared
  status: active
  schemaVersion: "1.0.0"

spec:
  provider: aws
  region: us-east-1
  cluster: eks-prod-commerce
  tier: production
  accessControl:
    deployApproval: required
    accessLevel: restricted
  monitoring:
    provider: datadog
    dashboardUrl: https://app.datadoghq.com/dashboard/commerce-prod

relations:
  - type: hosts
    target: DEP-order-service-k8s
