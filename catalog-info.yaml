apiVersion: anchored-spec.dev/v1alpha1
kind: Decision
metadata:
  name: adr-001-backstage-aligned-entity-envelope
  title: ADR-001 Backstage-Aligned Entity Envelope
  description: Anchored Spec uses the Backstage entity envelope as its primary authored format.
  annotations:
    anchored-spec.dev/source: docs/adr/ADR-001-backstage-aligned-entity-envelope.md
  tags:
    - adr
    - backstage
spec:
  status: accepted
  owner: group:default/anchored-spec-maintainers
  decision: Use the Backstage entity envelope as the primary authored architecture format.
  context: One stable entity format was needed for validation, relation analysis, discovery matching, governance, and interoperability.
  rationale: Backstage alignment gives the framework a recognizable model, reusable entity references, and ecosystem compatibility.
  alternatives:
    - Use a custom entity envelope designed only for Anchored Spec.
    - Keep architecture authoring in prose without a typed envelope.
---
apiVersion: anchored-spec.dev/v1alpha1
kind: Decision
metadata:
  name: adr-002-dual-storage-modes
  title: ADR-002 Dual Storage Modes
  description: Anchored Spec supports both manifest mode and inline mode for repository adoption.
  annotations:
    anchored-spec.dev/source: docs/adr/ADR-002-dual-storage-modes.md
  tags:
    - adr
    - storage
spec:
  status: accepted
  owner: group:default/anchored-spec-maintainers
  decision: Support both manifest mode and inline mode while encouraging each repository to choose one primary approach.
  context: Repositories want different authoring ergonomics, ranging from central catalogs to docs-first workflows.
  rationale: Dual modes lower adoption friction without forcing a single documentation style on every repository.
  dependsOn:
    - decision:default/adr-001-backstage-aligned-entity-envelope
  alternatives:
    - Support manifest mode only.
    - Support inline markdown entities only.
---
apiVersion: anchored-spec.dev/v1alpha1
kind: Decision
metadata:
  name: adr-003-declared-before-observed
  title: ADR-003 Declared Before Observed
  description: Discovery and drift support the authored model instead of silently replacing it.
  annotations:
    anchored-spec.dev/source: docs/adr/ADR-003-declared-before-observed.md
  tags:
    - adr
    - discovery
    - governance
spec:
  status: accepted
  owner: group:default/anchored-spec-maintainers
  decision: Treat declared architecture as primary and discovery output as bootstrap, validation pressure, and observed evidence.
  context: Discovery is valuable only if it improves the authored model rather than replacing it with unstable automation output.
  rationale: This preserves reviewability and makes automation trustworthy instead of authoritative by accident.
  dependsOn:
    - decision:default/adr-001-backstage-aligned-entity-envelope
  alternatives:
    - Allow discovery output to overwrite authored architecture automatically.
    - Treat observed state as the only source of truth.
---
apiVersion: anchored-spec.dev/v1alpha1
kind: Decision
metadata:
  name: adr-004-repository-local-workflow
  title: ADR-004 Repository-Local Workflow
  description: The framework keeps its core workflow inside the repository through local files, CLI operations, and CI.
  annotations:
    anchored-spec.dev/source: docs/adr/ADR-004-repository-local-workflow.md
  tags:
    - adr
    - workflow
    - repo-local
spec:
  status: accepted
  owner: group:default/anchored-spec-maintainers
  decision: Keep the core Anchored Spec workflow repository-local, CLI-first, and usable without a required control plane.
  context: The framework is intended to improve pull-request-level architecture work rather than move it into a separate hosted platform.
  rationale: Repository-local operation reduces adoption friction and keeps architecture changes near code changes.
  dependsOn:
    - decision:default/adr-001-backstage-aligned-entity-envelope
  alternatives:
    - Require a hosted control plane for core workflows.
    - Make the framework depend on a central enterprise registry first.
---
apiVersion: anchored-spec.dev/v1alpha1
kind: Decision
metadata:
  name: adr-005-flexible-document-structure
  title: ADR-005 Flexible Document Structure Configuration
  description: The docs tree becomes a first-class configurable structure separate from semantic domains.
  annotations:
    anchored-spec.dev/source: docs/adr/ADR-005-flexible-document-structure.md
  tags:
    - adr
    - docs
    - configuration
spec:
  status: proposed
  owner: group:default/anchored-spec-maintainers
  decision: Decouple semantic domains from physical documentation layout through a dedicated docs configuration model.
  context: The repository uses an architecture-first docs tree, but older configuration treated domains as directory paths.
  rationale: A flexible docs model matches the actual repository structure and keeps semantic domains separate from file layout concerns.
  dependsOn:
    - decision:default/adr-002-dual-storage-modes
    - decision:default/adr-004-repository-local-workflow
  alternatives:
    - Keep domains path-oriented and continue overloading them with filesystem meaning.
    - Introduce per-command directory flags without changing the config model.
